version: "3.7"

services:
  apresentacao:
    image: nginx:alpine
    volumes:
      - /root/sites/apresentacao:/usr/share/nginx/html:ro
      - /root/sites/apresentacao/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - portainer_default
    deploy:
      replicas: 1
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.apresentacao.rule=Host(`apresentacao.grit-ia.com`)"
        - "traefik.http.routers.apresentacao.entrypoints=websecure"
        - "traefik.http.routers.apresentacao.tls.certresolver=letsencryptresolver"
        - "traefik.http.services.apresentacao.loadbalancer.server.port=80"

networks:
  portainer_default:
    external: true
